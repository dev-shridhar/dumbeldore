name: Deploy to PythonAnywhere

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to PythonAnywhere
        env:
          PA_TOKEN: ${{ secrets.PA_TOKEN }}
          PA_USER: ${{ secrets.PA_USER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
        run: |
          API="https://www.pythonanywhere.com/api/v0/user/${PA_USER}"
          AUTH="Authorization: Token ${PA_TOKEN}"

          echo "📦 Uploading files..."
          for file in $(find . -type f -not -path './.git/*' -not -path './.github/*'); do
            remote_path="/home/${PA_USER}/dumbledore/${file#./}"
            mkdir -p "$(dirname /tmp/pa_upload/${remote_path})"
            cp "$file" "/tmp/pa_upload/${remote_path}"
          done

          cd /tmp/pa_upload
          tar czf /tmp/dumbledore.tar.gz .
          curl -s -X POST "${API}/files/path/~/" \
            -H "${AUTH}" \
            -H "Content-Type: application/gzip" \
            --data-binary @/tmp/dumbledore.tar.gz

          echo ""
          echo "📥 Installing dependencies..."
          curl -s -X POST "${API}/bash/" \
            -H "${AUTH}" \
            -H "Content-Type: application/json" \
            -d '{"command": "pip3 install -r ~/dumbledore/requirements.txt --user"}'

          echo ""
          echo "🔐 Creating .env file..."
          curl -s -X POST "${API}/bash/" \
            -H "${AUTH}" \
            -H "Content-Type: application/json" \
            -d "{\"command\": \"cat > ~/dumbledore/.env << 'ENVEOF'\nTELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}\nGROQ_API_KEY=${GROQ_API_KEY}\nBOT_USERNAME=${BOT_USERNAME}\nENVEOF\"}"

          echo ""
          echo "🔄 Restarting bot..."
          curl -s -X POST "${API}/bash/" \
            -H "${AUTH}" \
            -H "Content-Type: application/json" \
            -d '{"command": "pkill -f run_bot.py || true"}'

          curl -s -X POST "${API}/bash/" \
            -H "${AUTH}" \
            -H "Content-Type: application/json" \
            -d '{"command": "cd ~/dumbledore && nohup python3 run_bot.py > ~/dumbledore/bot.log 2>&1 &"}'

          echo ""
          echo "✅ Deployment complete!"
